<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하이퍼링크 / 블록 vs 인라인</title>
</head>
<body>
  <h1>하이퍼링크</h1>
  <hr>
  <h2>블록레벨과 인라인레벨</h2>
  <!-- 블록레벨 : 자동 줄바꿈& 부모의 너비만큼 자식이 사용, (개발자 도구에서 사이즈 확인) p tag 는 블록레벨
      인라인레벨 : 자동 줄바꿈X & 자기가 포함한 내용만큼만 너비를 사용(고정) a tag 는 인라인레벨 -->
  <p>네이버</p>
  <p>구글</p>
  <p>다음</p>
  <hr>
  <a href="">네이버</a>
  <a href="">구글</a>
  <a href="">다음</a>
  <hr>
  <h2>하이퍼링크 a anchor</h2>
  <ul>
    <li>하이퍼링크를 지정할 때</li>
    <li>href 속성</li>
    <li><pre>href = "값"</pre></li>
  </ul>
  <h3>하이퍼링크 연습</h3>
  <!-- <a href="url"(필수 속성) title="global attribute, 전역속성" 
       target="" _self 기본 생략 시 적용된 속성값, url을 현재 탭에서 연결
                 _blank url을 새 탭에서 연결
        >화면에 표시될 내용</a> -->
  <a href="https://www.naver.com/" title="마우스 후버시 툴팁">네이버1</a> <br>
  <a href="https://www.naver.com/" title="마우스 후버시 툴팁" target="_blank">네이버2</a> <hr>

  <h3>이미지에 하이퍼링크</h3>
  <a href="https://www.google.com/"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/500px-Google_2015_logo.svg.png" alt=""></a>

  <h3>전화번호에 연결</h3>
  <p>tel: 프로토콜은 모바일에서만 사용 가능</p>
  <a href="tel:010-1234-5678">010-1234-5678</a>

</body>
</html>
