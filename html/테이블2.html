<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블2</title>
</head>
<body>
  <table border="1" width="80%">
    <!-- tr*4>td*5{내용} , 줄과 줄이 병합 = rowspan, 컬럼끼리 병합 = colspan-->
    <tr>
      <td rowspan="2">내용</td>
      <td colspan="4">내용</td>
      <!-- <td>내용</td>
      <td>내용</td>
      <td>내용</td> -->
    </tr>
    <tr>
      <!-- <td>내용</td> -->
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td rowspan="2">내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <!-- <td>내용</td> -->
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
  </table>

</body>
</html>
