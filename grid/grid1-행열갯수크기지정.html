<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 1-행 열 갯수 크기 지정</title>
  <link rel="stylesheet" href="../reset.css">
</head>
<!-- grid
  1. container에게 grid 선언 @container
  2. grid의 행, 열 개수, 크기 @container
  3. 암시적 grid 선언(생략 가능) @container
  4. 아이템 배치 @item   >>생략하면 한줄 한칸이 기본값
  5. 여백
  6. 정렬
-->
<style>
  .wrap{margin: 50px;}
  /* 모양 */
  .grid-container{
    background-color: magenta;
  }
  .grid-container .item{
    background-color: dodgerblue;
    border: 1px solid #fff;
    box-sizing: border-box;
    opacity: 0.5;
  }
  /* grid */
  .grid-container{
    display: grid;
    grid-template-rows: 100px 200px;
    grid-template-rows: 100px 100px;
    grid-template-rows: repeat(2, 100px);
    grid-template-columns: repeat(4, 100px);
    /* grid-template-columns: 100px 200px 100px 200px;
    grid-template-columns: repeat(2, 100px 200px); */
    grid-template-columns: repeat(4, 3fr);
    /* fr = 부모의 남은 공간을 나눌 단위 */
    /* 12컬럼 그리드에서 3컬럼을 사용하여 4단 사용 */
    grid-template-columns: 1fr 4fr 1fr;
    grid-template-columns: 100px 1fr 150px;
    grid-template-columns: 20% 50% 30%;
    grid-template-columns: 20% minmax(500px, 50%) 30%;
  }
  /* grid item */
  .grid-container .item{

  }
  /* 4. 아이템 배치  */
  .grid-container .item:nth-child(1){

  }
  .grid-container .item:nth-child(2){
    
  }
  .grid-container .item:nth-child(3){

  }
  .grid-container .item:nth-child(4){

  }
  .grid-container .item:nth-child(5){

  }
  .grid-container .item:nth-child(6){
    
  }
</style>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
