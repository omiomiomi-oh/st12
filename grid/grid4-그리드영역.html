<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid 4-그리드 영역 grid-area</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .wrap{
      display: grid;
      grid-template-rows: 150px minmax(500px, auto) 300px;
      grid-template-columns: 250px 1fr;
      /* 그리드 영역 이름 활용(생략 가능) */
      grid-template-areas: 
      "hd hd"
      "lnb mc"
      ". footer"      
      ;
    }
    header{
      background-color: #ccc;
      grid-area:hd;
    }
    aside{
      background-color: #fcc;
      grid-area:lnb;
    }
    .main-content{
      background-color: #ccf;
      grid-area:mc;
      
    }
    footer{
      background-color: #cfc;
      grid-area:footer;

    }
    </style>
</head>
<body>
  <div class="wrap">
    <header>헤더</header>
    <aside>LNB</aside>
    <main class="main-content">페이지 내용</main>
    <footer>푸터</footer>
  </div>
</body>
</html>
