<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 3 - 정렬, 배치</title>
  <link rel="stylesheet" href="../reset.css">
</head>
<!-- grid
  1. container에게 grid 선언 @container
  2. grid의 행, 열 개수, 크기 @container
  3. 암시적 grid 선언(생략 가능) @container
  4. 아이템 배치 @item   >>생략하면 한줄 한칸이 기본값
  5. 여백
  6. 정렬
-->
<style>
  .wrap{margin: 50px;}
  /* 모양 */
  .grid-container{
    background-color: #ccc;
  }
  .grid-container .item{
    background-color: dodgerblue;
    box-sizing: border-box;
    border: 1px solid magenta;
  }
  /* grid */
  .grid-container{
    display: grid;
    min-height: 500px;
    grid-template-rows: repeat(3, 100px);
    grid-template-columns: repeat(3, 30%);
    /* 수평 정렬 start center end
            정렬/배치 space-between, around, evenly
            기본값 = normal */
    justify-content: center;
    justify-content: space-between;
    justify-content: normal;
    /* normal의 의미 = 크기를 지정하지 않으면 block axis 방향으로 stretch, 크기를 지정하면 start */
    align-content: end;

    /* 5. 여백 : gap(container), margin(item) 
    justify- , align- 값이 between-*으로 설정되면 앞에 설정한 여백 값을 무시*/

    justify-items: center;
    align-items: center;
    
  }
  /* grid item */
  .grid-container .item{
    
  }
  /* 4. 아이템 배치  */
  .grid-container .item:nth-child(1){
    justify-self: start;
    align-self: start;

  }
  .grid-container .item:nth-child(2){
    
  }
  .grid-container .item:nth-child(3){

  }
  .grid-container .item:nth-child(4){

  }
  .grid-container .item:nth-child(5){

  }
  .grid-container .item:nth-child(6){
    
  }
</style>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
