<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 2 - 아이템 배치</title>
  <link rel="stylesheet" href="../reset.css">
</head>
<!-- grid
  1. container에게 grid 선언 @container
  2. grid의 행, 열 개수, 크기 @container
  3. 암시적 grid 선언(생략 가능) @container
  4. 아이템 배치 @item   >>생략하면 한줄 한칸이 기본값
  5. 여백
  6. 정렬
-->
<style>
  .wrap{margin: 50px;}
  /* 모양 */
  .grid-container{
    background-color: #ccc;
  }
  .grid-container .item{
    background-color: dodgerblue;
  }
  /* grid */
  .grid-container{
    display: grid;
    gap: 10px;
    grid-template-rows: repeat(3, minmax(100px, auto));
    grid-template-columns:  repeat(3, 1fr);
    
  }
  /* grid item */
  .grid-container .item{

  }
  /* 4. 아이템 배치  */
  .grid-container .item:nth-child(1){
    grid-column-start: 1;
    grid-column-end: 2;
    grid-column: 1/3;
    grid-column: 1/span 3;
  }
  .grid-container .item:nth-child(2){
    
  }
  .grid-container .item:nth-child(3){

  }
  .grid-container .item:nth-child(4){

  }
  .grid-container .item:nth-child(5){

  }
  .grid-container .item:nth-child(6){
    
  }
</style>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Qui totam quam provident iusto quaerat similique consequatur temporibus libero inventore numquam iure neque maxime odit dolor, aliquam, harum, quidem laboriosam nesciunt.</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
