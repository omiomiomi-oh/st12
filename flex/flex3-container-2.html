<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex 3 - container-2</title>
  <link rel="stylesheet" href="../reset.css">
   <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  <style>
    .wrap{margin: 50px;}
    .container{
      background-color: #fcc;
    }
    .item{
      border: 1px solid #000;
    }
    
    .flex1{
      width: 300px;
      height: 150px;
      /* 1. flex 컨테이너 선언 ; 단이 될 요소의 부모  */
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      column-gap: 1rem;
      row-gap: 10px;
      justify-content: start;
      /* align-content: stretch; */
      align-content: start;
      margin-bottom: 50px;
    }
    .flex1 .item{
      /* 아이템의 확장/축소 안되도록 고정 */
      flex-grow: 0;
      flex-shrink: 0;
      width: 80px;
    }
    .flex2{
      display: flex;
      width: 300px;
      height: 150px;
      /* flex-direction: row; */
      flex-direction: column;
      flex-wrap: wrap;
      /* gap: 1rem; */
      justify-content: space-evenly;
      align-content: space-evenly;
    }
    .flex2 .item{
      flex-grow: 0;
      flex-shrink: 0;
      width: 80px;
      height: 60px;
      /* width: calc(33.33% - (1rem * (3 - 1) / 3)); */
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex1">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
    <div class="container flex2">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>

  </div>
</body>
</html>
