<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex1 수직 수평 가운데 정렬</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .visual-section{
      display: flex;
      background-color: #ffc;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      justify-content: center;
      align-items: center;

    }
    .visual-section .text-wrap{
      background-color: #cff;
      flex:none;
      width: 50%;
      min-width: 300px;
      max-width: 500px;
      box-sizing: border-box;
      padding: 1rem 2rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <div class="text-wrap">
        <div class="title">Title</div>
        <div class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi enim debitis itaque, explicabo atque distinctio quo eum. Rem, optio porro!</div>
      </div>
    </div>
  </div>
</body>
</html>
