<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex 실습7 - 상품목록</title>
  <link rel="stylesheet" href="../reset.css">
   <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  
  <style>
    /* 모양 */
    .ec-base-product{background-color: #ccc;}
    .ec-base-product .prdList{background-color: #fcc;}
    .ec-base-product .prdList >li{
      opacity: 0.5;
      box-sizing: border-box;
      border: 1px solid #000;
      background-color: #cff;
      padding: 1rem;
    }
    
    /* flex */
    .ec-base-product{}
    .ec-base-product .prdList{
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    /* flex item => width=auto, height=auto 가 기본값 */
    .ec-base-product .prdList >li{
      flex-grow: 0;
      flex-shrink: 0;
      width: calc(25% - (20px * (4 - 1) / 4));
      aspect-ratio: 2/1;
    }
    @media (max-width:1023.98px){
      /* tablet 3단 */
      .ec-base-product .prdList >li{
        width: calc(33.33% - (20px * (3 - 1) / 3));
      }
    }
    @media (max-width:767.98px){
      /* 모바일 2단 */
      .ec-base-product .prdList >li{
        width: calc(50% - (20px * (2 - 1) / 2));
      }
    }

  </style>
</head>
<body>
  <div class="ec-base-product">
    <ul class="prdList">
      <li>아이템1</li>
      <li>아이템2</li>
      <li>아이템3</li>
      <li>아이템4</li>
      <li>아이템5</li>
      <li>아이템6</li>
      <li>아이템7</li>
      <li>아이템8</li>
    </ul>
  </div>
</body>
</html>
