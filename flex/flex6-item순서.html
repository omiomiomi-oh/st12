<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex 6 - item 순서</title>
  <link rel="stylesheet" href="../reset.css">
   <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  
  <style>
    .wrap{margin: 50px;}
    .container{
      background-color: #fcc;
    }
    .item{
      border: 1px solid #000;
    }
    
    .flex{
      display: flex;
      flex-direction: row;    /*기본값*/
      flex-wrap: nowrap;    /*기본값*/
      gap: 10px;              
      justify-content: flex-start;    /*주축 정렬 기본값*/
      align-content: stretch;         /*교차축 정렬 기본값*/
    }
    .flex .item{
      /* flex-grow: 0;       기본값 */
      flex-grow: 1;
      /* flex-shrink: 1;     기본값 */
      flex-shrink: 0;
      flex-basis: auto;   /*기본값*/
      /* width: calc(아이템크기% - (여백 * (단 - 1) / 단)) */
      width: calc(25% - (10px * (4 - 1) / 4));
      height: auto;
      box-sizing: border-box;
    }
    .flex .item:nth-child(1){
      order: 3;
    }
    .flex .item:nth-child(2){
      order: 2;
    }
    .flex .item:nth-child(3){
      order: 1;
    }
    .flex .item:nth-child(4){
      order: 4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
      
    </div>
  </div>
</body>
</html>
