<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex 1</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .wrap{margin: 50px;}
    .container{
      padding: 1rem;
      background-color: #fcc;
    }
    .item{
      border: 1px solid #000;
      width: 100px;
    }
    .float .item{
      float: left;
    }
    .float::after{
      content: "";
      display: block;
      clear: both;
    }
    .inline-block{
     font-size: 0;
    }
     .inline-block .item{
      display: inline-block;
      font-size: 1rem;
     }
    .flex{
      display: flex;
    }
    
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
