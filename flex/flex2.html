<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex 2</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .wrap{margin: 50px;}
    .container{
      /* padding: 1rem; */
      background-color: #fcc;
      box-sizing: border-box;
    }
    .item{
      border: 1px solid #000;
      box-sizing: border-box;
    }
    
    .flex{
      /* 1. Flex 선언, 얘가 flex container */
      display: flex;
      /* 2. flex 방향 설정 ; row가 기본값, 얘가 main axis */
      flex-direction: row;
       /* flex-wrap: nowrap; */
      flex-wrap: wrap;
      gap: 5px 10px;
    }
    .flex .item{  
      /* width: 25%; */
      width: calc(25% - (10px * (4 - 1)) / 4);
      /* 아이템을 부모의 공간에 맞게 확장 */
      flex-grow: 0;   
      /* 아이템을 부모의 공간에 맞게 축소 1이 축소하겠다, 0은 축소하지 않겠다 */
      flex-shrink: 0;     
     
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">Lorem, ipsum.</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
