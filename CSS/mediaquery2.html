<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media query 2</title>
  <style>
    *{margin: 0; padding: 0;}
    ol, ul{list-style: none;}
    a:link,
    a:visited,
    a:active{
      color: currentColor;
      text-decoration: underline;
    }
    a:hover{
      color: #f00; 
      text-decoration: underline;
    }
    
    header{
      background-color: #ccc;
    }
    header .inner{
      width: 90%;
      max-width: 1400px;
      margin: 0 auto;
      background-color: #6cc;
    }
    
    header .inner::after{
      content: "";
      display: block;
      clear: both;        /*float clearfix*/
     }
    
    header .gnb-wrap{
      background-color: #cfc;
      margin-left: 50px;
    }
  
  header .logo,
  header .gnb-wrap{
    float: left;
    
  }
  header .util,
  header .m-nav-btn{
    float: right;
  }
  header .gnb-wrap .gnb li{
    display: inline-block;
    padding: 0.5em 1em;
    background-color: #fff;
  }
  
  header .util a{
    display: inline-block;
    padding: 0.5em 1em;
    background-color: #fff;
    margin-left: 1em;
  }
  
  header .m-nav-btn{
    display: none;
  }

  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="inner">
        <h1 class="logo">CHOI</h1>
        <nav class="gnb-wrap">
          <ul class="gnb">
            <li><a href="">menu1</a></li>
            <li><a href="">menu2</a></li>
            <li><a href="">menu3</a></li>
            <li><a href="">menu4</a></li>
            <li><a href="">menu5</a></li>
          </ul>
        </nav>
        <div class="util">
          <a href="">상단기능메뉴1</a><a href="">상단기능메뉴2</a><a href="">상단기능메뉴3</a>
        </div>   
        <!-- util 마감 -->
        <div class="m-nav-btn"><img src="images/menu.png" alt="모바일 사이드 메뉴 펼치기"></div>
      </div>
      <!-- inner 마감 -->
    </header>
  </div>
  <!-- wrap 마감 -->
</body>
</html>
