<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여백겹침현상</title>  
</head>
<body>
  <header>
    <div class="inner">
      <div class="child child1">내용</div>
      <div class="child child2">내용</div>
    </div>
  </header>

  <style>
    *{margin: 0; padding: 0;}
    body{background-color: #ccc;}

    header{
      background-color: #fff;
      /* 헤더와 요소 사이의 안쪽 여백 */
      padding: 1rem 0;
      border-bottom: 1px solid #000;
      min-height: 100px;
    }
    /* 정렬은 부모에게 */
    header .inner{
      background-color: #ccc;
      /* width: auto; */
      min-width: 600px;
      max-width: 1400px;
      width: 90%;
      margin: 0 auto;
      /*바깥 여백 기본값은 오른쪽에만 주는데, 좌우 margin auto로 주면 좌우 바깥 여백을 반으로 나눠줘서 가운데 정렬 가능  */
      padding: 50px 0;
    }
    header .inner .child{
      padding: 1rem;
      /* margin: 50px; */
    }
    header .inner .child1{background-color: #86f;}
    header .inner .child2{background-color: #f68;}
  </style>
</body>
</html>
