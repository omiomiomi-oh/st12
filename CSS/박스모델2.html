<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box model2</title>
  <style>
    *{margin: 0; padding: 0;}
    .box{
      background-color: #ccc;
      margin: 50px;
      width: 200px;
      /* height: 150px; */
      min-height: 150px;
    }
    .box2{
      border-top: 10px solid #f00;
      border-right: 10px dotted dodgerblue;
      border-bottom: 4px dashed green;
      border-left: 10px double ;
      padding: 10px 20px 30px 40px;
    }
    .box3{
      border:  10px dashed blue;
      padding: 10px 50px 30px;
    }
    .box4{
      border:  10px dashed blue;
      border-left: none;
      border-right: none;
      padding: 10px 50px;
    }
  </style>
</head>
<body>
  <div class="box box1">박스1</div>
  <div class="box box2">박스2</div>
  <div class="box box3">박스3</div>
  <div class="box box4">Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequatur voluptatum suscipit neque porro molestias libero deleniti dicta. Voluptates debitis fugit iusto reprehenderit sequi distinctio aperiam quaerat aspernatur, rem, praesentium eum.</div>
</body>
</html>
