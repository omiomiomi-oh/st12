<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오로라 메시 그라디언트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .exam {
      width: 100%;
      height: 100vh;
      background: 
        radial-gradient(ellipse 800px 600px at 20% 30%, #10d8cf 0%, transparent 40%),
        radial-gradient(ellipse 900px 700px at 80% 20%, #570537 0%, transparent 45%),
        radial-gradient(ellipse 700px 550px at 60% 70%, #84a33b 0%, transparent 50%),
        radial-gradient(ellipse 800px 650px at 30% 80%, #641111 0%, transparent 45%),
        radial-gradient(ellipse 1000px 800px at 70% 60%, #10d8cf 0%, transparent 50%),
        radial-gradient(ellipse 750px 600px at 45% 45%, #570537 0%, transparent 40%),
        radial-gradient(ellipse 850px 700px at 15% 60%, #84a33b 0%, transparent 45%),
        radial-gradient(ellipse 900px 750px at 85% 75%, #641111 0%, transparent 50%);
      background-size: 
        100% 100%,
        100% 100%,
        100% 100%,
        100% 100%,
        100% 100%,
        100% 100%,
        100% 100%,
        100% 100%;
      background-repeat: no-repeat;
      position: relative;
    }

    /* 텍스트 컨테이너 */
    .text-container {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .text-content {
      color: rgb(15, 1, 1);
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="exam"></div>
  
  <div class="text-container">
    <div class="text-content">
      Aurora Gradient
    </div>
  </div>
</body>
</html>
