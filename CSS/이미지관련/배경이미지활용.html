<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배경 이미지 활용</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  
  <!-- .noto-sans-kr-<uniquifier> {
    font-family: "Noto Sans KR", sans-serif;
    font-optical-sizing: auto;
    font-weight: <weight>;
    font-style: normal;
  } -->

  <style>
    *{margin: 0; padding: 0;}
   
    .visual-section{
      width: 100%;
      height: 100vh;
      background-color: #97948d;
      background-image: url(../images/background-test.jpg);
      background-repeat: no-repeat;
      background-position: right top;
      background-size: auto 200vh;
      text-align: center;
      align-content: center;
      position: relative;
    }
    .visual-section::after{
      content: "";
      display: block;
      background-color: rgba(0, 255, 255, 0.5);
      width: 100%;
      height: 100%;
      position: absolute;
      left: 0;  top: 0;
      z-index: 10;
      /* z-index = layer 순서를 지정할 수 있는 값 */
    }

    .visual-section .text-wrap{
      position: relative;
      z-index: 20;
      display: inline-block;
      width: 50%;
      padding: 1rem 2rem;
      /* margin: 0 auto; */
      background-color: rgba(0, 0, 0, 0.5);
      font-family: "Noto Sans KR", sans-serif;
      color: #8bffb7;
    }
    .visual-section .text-wrap .title{
      /* font-family: "Noto Sans KR", sans-serif; */
      font-size: 4rem;
      font-weight: 300;
    }
    .visual-section .text-wrap .desc{
      /* font-family: "Noto Sans KR", sans-serif; */
      font-size: 1rem;
      font-weight: 200;
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <!-- .text-wrap>p.title>lorem3^p.desc>lorem20 -->
      <div class="text-wrap">
        <p class="title">Lorem, ipsum dolor.</p>
        <p class="desc">Lorem, ipsum dolor sit amet consectetur adipisicing elit. <br>Voluptas ex rem eum ipsa sed tempore, harum placeat ab architecto iusto?</p>
      </div>
    </div>
  </div>
</body>
</html>
