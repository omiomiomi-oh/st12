<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object - fit</title>
</head>
<body>
  <img src="../images/testimg.png" alt="" class="exam1">
  <img src="../images/testimg.png" alt="" class="exam2">
  <img src="../images/testimg.png" alt="" class="exam3">
  <style>
    .exam1{
      width: 200px;
    }
    .exam2{
      height: 300px;
    }
    .exam3{
      width: 400px;
      height: 200px;
      background-color: #fcc;
      object-fit: contain;
      object-fit: cover;
      object-position: center top;
    }
  </style>
</body>
</html>
