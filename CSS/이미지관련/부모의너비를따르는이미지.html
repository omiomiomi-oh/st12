<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의 너비를 따르는 이미지</title>
  <style>
    *{margin: 0; padding: 0;}
    .wrap{
      margin: 30px;
    }
    .img-wrap{
      background-color: #f00;
    }
    .img-wrap img{
      width: 100%;
      display: block;
      opacity: 0.5;
    }
    /* 부모의 너비를 따르지만 자신의 크기보다는 커지지 않아야 할 때 */
    .max-img{
      width: 80%;
      background-color: #0f0;
    }
    .max-img img{
      opacity: 0.5;
      /* width: 100%;  얘가 있으면 max-width가 의미 없음, max-width는 width가 auto일 때 지정 가능 */
      max-width: 100%;
    }
    .img-wrap2{
      background-color: #00f;
      height: 300px;
    }
    .img-wrap2 img{
      opacity: 0.5;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../images/smartbanner-01-01-pc.png" alt="원피스 할인 이벤트">
    </div>
    <div class="max-img">
      <img src="../images/testimg.png" alt="">
    </div>
    <div class="img-wrap2">
      <img src="../images/testimg.png" alt="">
    </div>
  </div>
</body>
</html>
