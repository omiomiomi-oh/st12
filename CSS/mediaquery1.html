<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>media query1</title>
  <style>
    body{
      background-color: #ccc;
      font-size: 16px;
    }
    body::before{
      content: "데스크탑 미디어 쿼리";
    }

    @media (max-width:1400px){
      body{
      background-color: #fcc;
      font-size: 16px;
      }
      body::before{
      content: "최대 크기 1400픽셀인 즉 1400 이하 모니터";
      }
    }
    @media(max-width:1200px){
      body{
      background-color: #cfc;
      font-size: 16px;
      }
      body::before{
      content: "최대 크기 1200픽셀인 즉 1200 이하 모니터";
      }
    }
    @media(min-width:1000px) and (max-width:1200px){
      body{
      background-color: #cfc;
      font-size: 16px;
      }
      body::before{
      content: "최소 1000픽셀 최대 크기 1200픽셀인 즉 1000 ~ 1200  모니터";
      }
    }
  </style>
</head>
<body>
  
</body>
</html>
