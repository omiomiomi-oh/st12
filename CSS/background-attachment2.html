<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>background-attachment2</title>
  <style>
    *{margin: 0; padding: 0;}
    .container-wrap{
      margin: 0 50px;
      /* margin: 0;  */
      background-color: #ccc;
    }
    .container-wrap > section{
      box-sizing: border-box;
      width: auto;
      padding: 1em;
      height: 100vh;
    }
    .section1{
      background-color: rgba(255, 136, 102, 0.2);
    }
    .section2{
      background-color: rgba(102, 136, 255, 0.2);
    }
    .section3{
      background-color: rgba(102, 255, 136, 0.2);
    }
  </style>
</head>
<body>
  <div class="container-wrap">
    <!-- section.section$*3>p.title>{section$} -->
    <section class="section1">
      <p class="title">section1</p>
    </section>
    <section class="section2">
      <p class="title">section2</p>
    </section>
    <section class="section3">
      <p class="title">section3</p>
    </section>
  </div>
</body>
</html>
