<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition 2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 100px;}

    .box{
      /* 글자색 = magenta */
      color: magenta;
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 3px;
      background-color: #6f8;
      text-align: center;
    }
    .box:hover{
      /* 글자색 = magenta */
      color: cyan;
      font-size: 5rem;
      font-weight: 400;
      letter-spacing: 10px;
      background-color: #f68;
      text-align: right;

      transition: all 0.3s;     /* all >> 숫자에 해당되는 값만 transition 됨 */
    }
  </style>
</head>
<body>
  <div class="box">
    SALE
  </div>
</body>
</html>
