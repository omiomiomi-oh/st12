<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기-박스모델의 이해</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;}
    .media-box{
      max-width: 768px;
      background-color: #bbb;
    }
    .iframe-wrap{
      background-color: #ccf;
      width: 500px;
      height: 500px;
      padding-top: 500px;
      box-sizing: border-box;
      /* overflow: hidden; */
      position: relative;
    }
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      width: 100%;   height: 100%;     /*부모의 content 영역을 다 사용*/
      position: absolute;
      left: 0; top: 0;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque quidem enim dolore velit molestias voluptatum esse consequuntur necessitatibus minus? Corrupti deserunt aspernatur est, in rerum nisi nobis eos facilis quisquam?</div>      
    </div>
  </div>
</body>
</html>
