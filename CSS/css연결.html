<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS연결</title>
  <style>
    .exam{
      background-color: #ccc;
      color: #86f;
    }
    h2{border-bottom: 1px solid #333;}
  </style>
</head>
<body>
  <h1>CSS의 다양한 연결법</h1>
  <h2>문서 내 스타일 지정</h2>
  <div class="exam">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo dicta unde perspiciatis corporis laboriosam, aut quas impedit nobis inventore est deserunt sit? Magni quibusdam dolores recusandae, nulla laudantium ab eveniet.</div>

  <!-- 인라인 스타일 - 태그 안에 css 스타일 지정, java script랑 연결해서 사용하는 경우가 많음 -->
  <p style="color: #f00; border: 1px solid #00f;">Lorem ipsum dolor sit.</p>
</body>
</html>
